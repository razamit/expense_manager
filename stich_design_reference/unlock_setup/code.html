<style>
    body {
        font-family: 'Inter', sans-serif;
    }

<body class="bg-background min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Blurred Simulated App Shell Background -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&amp;w=2070&amp;auto=format&amp;fit=crop')] bg-cover bg-center opacity-20 blur-md grayscale" data-alt="A highly complex, data-dense financial dashboard interface displayed on a high-resolution monitor. The screen is filled with intricate charts, tables, and numerical data sets in a light-mode color scheme of pristine whites and deep blacks. The entire image is intentionally out of focus and desaturated, creating a soft, abstract background of structural data patterns. The mood is analytical, secure, and corporate."></div>
<div class="absolute inset-0 bg-surface/70 backdrop-blur-sm"></div>
</div>
<!-- Centered Modal Plate -->
<main class="relative z-10 w-full max-w-[440px] bg-surface-container-lowest border border-outline-variant p-margin shadow-sm mx-md">
<!-- Header -->
<header class="text-center mb-lg">
<div class="w-12 h-12 bg-surface-container rounded flex items-center justify-center mx-auto mb-md border border-outline-variant">
<span class="material-symbols-outlined text-[24px] text-primary" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface mb-xs">Create Master Password</h1>
<p class="font-body-md text-body-md text-on-surface-variant px-sm">Set a strong master password to encrypt and secure your financial data locally.</p>
</header>
<!-- Form -->
<form class="flex flex-col gap-md">
<!-- New Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface" for="new-password">New Password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant p-md font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary pr-xl transition-colors" id="new-password" placeholder="Enter new password" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm New Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface" for="confirm-password">Confirm New Password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant p-md font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary pr-xl transition-colors" id="confirm-password" placeholder="Re-enter password" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Security Context Note -->
<div class="flex items-start gap-sm bg-surface-container p-sm border border-outline-variant mt-xs">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant shrink-0 mt-[2px]">encrypted</span>
<p class="font-data-tabular text-data-tabular text-on-surface-variant text-left leading-snug">
                    Data is encrypted locally. There is no password recovery available.
                </p>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary py-md font-label-sm text-label-sm mt-sm hover:opacity-90 active:opacity-100 transition-opacity flex items-center justify-center gap-xs" type="submit">
                Create Password
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
</main>
</body></html>
